name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        type: boolean
        description: 'Skip unit tests (for faster builds)'
        required: false
        default: false
      skip_lint:
        type: boolean
        description: 'Skip linting checks'
        required: false
        default: false
      skip_type_check:
        type: boolean
        description: 'Skip TypeScript type checking'
        required: false
        default: false

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20.x'
  FIREBASE_EMULATOR_MODE: 'true'
  FIREBASE_AUTH_EMULATOR_HOST: 'localhost:9099'
  FIREBASE_STORAGE_EMULATOR_HOST: 'localhost:9199'
  FIREBASE_EMULATOR_PROJECT_ID: 'demo-investify'
  FIREBASE_PROJECT_ID: 'demo-investify'
  FIREBASE_WEB_API_KEY: 'demo-api-key'

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # Setup
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify dependencies
        run: |
          echo "Verifying critical dependencies..."
          npx jest --version
          npx tsc --version
          npx eslint --version
          npx prettier --version
          echo "✅ All dependencies verified"

      # ============================================
      # Code Quality Checks
      # ============================================
      - name: TypeScript type check
        id: type-check
        if: ${{ !inputs.skip_type_check }}
        run: |
          echo "🔍 Running TypeScript type check..."
          npm run type-check

      - name: ESLint check
        id: lint
        if: ${{ !inputs.skip_lint }}
        run: |
          echo "🔍 Running ESLint..."
          npm run lint

      - name: Prettier format check
        id: format
        if: ${{ !inputs.skip_lint }}
        run: |
          echo "🔍 Checking code formatting..."
          npm run format:check

      # ============================================
      # Tests
      # ============================================
      - name: Run unit tests
        id: test
        if: ${{ !inputs.skip_tests }}
        run: |
          echo "🧪 Running unit tests with coverage..."
          npm run test:ci

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
        continue-on-error: true

      # ============================================
      # Build
      # ============================================
      - name: Build application
        id: build
        run: |
          echo "🏗️  Building Next.js application..."
          npm run build
        env:
          # Explicitly disable Turbopack for CI builds
          TURBOPACK: 0

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .next/
          retention-days: 1
        continue-on-error: true

      # ============================================
      # Security
      # ============================================
      - name: Security audit
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level=moderate --production || echo "⚠️  Security warnings found (non-blocking)"
        continue-on-error: true

      # ============================================
      # Report Results
      # ============================================
      - name: Generate coverage summary
        if: always()
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "coverage_exists=true" >> $GITHUB_OUTPUT
            
            # Extract coverage percentages
            LINES=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
            STATEMENTS=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct' coverage/coverage-summary.json)
            
            echo "lines=$LINES" >> $GITHUB_OUTPUT
            echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          else
            echo "coverage_exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Determine status
            const conclusion = '${{ job.status }}';
            const statusEmoji = conclusion === 'success' ? '✅' : '❌';

            // Build coverage section
            let coverageSummary = '';
            if ('${{ steps.coverage.outputs.coverage_exists }}' === 'true') {
              coverageSummary = `
            ### 📊 Test Coverage
            - **Lines**: ${{ steps.coverage.outputs.lines }}%
            - **Statements**: ${{ steps.coverage.outputs.statements }}%
            - **Functions**: ${{ steps.coverage.outputs.functions }}%
            - **Branches**: ${{ steps.coverage.outputs.branches }}%
            `;
            } else {
              coverageSummary = '\n_Coverage report not available_\n';
            }

            const body = `## ${statusEmoji} CI Pipeline Results

            **Status**: ${conclusion === 'success' ? '✅ All checks passed!' : '❌ Some checks failed'}

            ### 📋 Checks Summary
            | Check | Status |
            |-------|--------|
            | TypeScript | ${{ steps.type-check.conclusion == 'success' && '✅ Passed' || '❌ Failed' }} |
            | ESLint | ${{ steps.lint.conclusion == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Prettier | ${{ steps.format.conclusion == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Tests | ${{ steps.test.conclusion == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Build | ${{ steps.build.conclusion == 'success' && '✅ Passed' || '❌ Failed' }} |

            ${coverageSummary}

            ---
            <sub>🤖 Updated at ${new Date().toUTCString()} | [View Details](${context.payload.pull_request.html_url}/checks)</sub>
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('CI Pipeline Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
              console.log('Updated existing PR comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
              console.log('Created new PR comment');
            }

      - name: Generate job summary
        if: always()
        run: |
          echo "## 🎯 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ TypeScript type checking" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ESLint code quality" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Prettier formatting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests with coverage" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Production build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.coverage.outputs.coverage_exists }}" = "true" ]; then
            echo "### 📊 Coverage" >> $GITHUB_STEP_SUMMARY
            echo "- Lines: ${{ steps.coverage.outputs.lines }}%" >> $GITHUB_STEP_SUMMARY
            echo "- Statements: ${{ steps.coverage.outputs.statements }}%" >> $GITHUB_STEP_SUMMARY
            echo "- Functions: ${{ steps.coverage.outputs.functions }}%" >> $GITHUB_STEP_SUMMARY
            echo "- Branches: ${{ steps.coverage.outputs.branches }}%" >> $GITHUB_STEP_SUMMARY
          fi
